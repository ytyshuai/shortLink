server:
  port: 8080

spring:
  application:
    name: event-platform
  datasource:
    url: jdbc:mysql://localhost:3306/campus_event_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: campus_user
    password: campus_password
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      password: redis_pass
      database: 0

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

jwt:
  secret: Y2FtcHVzLWV2ZW50LXBsYXRmb3JtLXNlY3JldC1rZXktd2l0aC1lbm91Z2gtbGVuZ3RoCg==
  expiration: 604800000 # 7 days